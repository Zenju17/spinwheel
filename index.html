<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Spin & Win!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --matcha:   #5B7A4E;
    --cream:    #F9F4EC;
    --gold:     #C9963A;
    --blush:    #E8C9AA;
    --charcoal: #2B2B2B;
    --soft:     #F0E8DA;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 7vw, 52px);
    font-weight: 900;
    color: var(--charcoal);
    line-height: 1.1;
  }
  .header p {
    margin-top: 8px;
    font-size: 14px;
    color: #777;
  }

  /* ── Wheel stage ── */
  .wheel-stage {
    position: relative;
    width: min(420px, 90vw);
    height: min(420px, 90vw);
    margin: 0 auto 28px;
  }

  /* Pointer */
  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 34px solid var(--gold);
    z-index: 10;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.25));
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: 0 8px 40px rgba(91,122,78,.22), 0 2px 8px rgba(0,0,0,.10);
  }

  /* Center cap */
  .center-cap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--cream);
    border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .center-cap span {
    font-size: 22px;
    line-height: 1;
  }

  /* ── Spin button ── */
  .spin-btn {
    display: block;
    margin: 0 auto;
    padding: 18px 52px;
    background: var(--matcha);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(91,122,78,.35);
    transition: transform .15s, box-shadow .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .spin-btn:active { transform: scale(.97); box-shadow: 0 2px 10px rgba(91,122,78,.25); }
  .spin-btn:disabled {
    background: #aaa;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  .rule {
    margin-top: 16px;
    font-size: 12px;
    color: #999;
    text-align: center;
  }

  /* ── Result overlay ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(43,43,43,.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay.show { display: flex; }

  .result-card {
    background: var(--cream);
    border-radius: 28px;
    padding: 40px 32px 36px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    animation: pop .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop {
    from { transform: scale(.7); opacity: 0; }
    to   { transform: scale(1);  opacity: 1; }
  }

  .result-emoji {
    font-size: 56px;
    line-height: 1;
    margin-bottom: 16px;
  }
  .result-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--charcoal);
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .result-note {
    font-size: 14px;
    color: #666;
    line-height: 1.55;
    margin-bottom: 28px;
  }

  .close-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--matcha);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    transition: background .15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .close-btn:active { background: #4a6640; }

  .good-luck-note {
    margin-top: 12px;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Spend $5 or more · One spin per purchase</div>
  <h1>Spin &amp; Win</h1>
  <p>Tap the button and see what you get 🍵</p>
</div>

<div class="wheel-stage">
  <div class="pointer"></div>
  <canvas id="wheel" width="600" height="600"></canvas>
  <div class="center-cap"><span>🍃</span></div>
</div>

<button class="spin-btn" id="spinBtn">SPIN THE WHEEL</button>
<p class="rule">One spin per qualifying purchase. Good luck!</p>

<!-- Result overlay -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-emoji" id="resEmoji"></div>
    <div class="result-label">You won</div>
    <div class="result-title" id="resTitle"></div>
    <div class="result-note" id="resNote"></div>
    <button class="close-btn" id="closeBtn">Claim My Prize 🎉</button>
    <p class="good-luck-note" id="glNote"></p>
  </div>
</div>

<script>
// ── Segments ──────────────────────────────────────────────────────────────────
// Good Luck appears 4x so it's visually dominant; the other 3 appear once each.
// Weights: GL≈4/7 ≈ 57%, others ≈ 14% each (house-friendly split).
const SEGMENTS = [
  {
    label: "50% Off\nVoucher",
    emoji: "🏷️",
    fill: "#5B7A4E",   // matcha
    text: "#FFFFFF",
    result: "50% Off Voucher",
    note: "Show this screen to the cashier to redeem your 50% off voucher on your next purchase.",
    goodluck: false,
  },
  {
    label: "Good\nLuck",
    emoji: "🍀",
    fill: "#F9F4EC",   // cream
    text: "#2B2B2B",
    result: "Good Luck!",
    note: "",
    goodluck: true,
  },
  {
    label: "Free\nMini Waffle\nSoft Serve",
    emoji: "🍦",
    fill: "#C9963A",   // gold
    text: "#FFFFFF",
    result: "Free Mini Waffle Soft Serve (Palm)",
    note: "Show this screen to the cashier to claim your free Mini Waffle Soft Serve!",
    goodluck: false,
  },
  {
    label: "Good\nLuck",
    emoji: "🍀",
    fill: "#E8C9AA",   // blush
    text: "#2B2B2B",
    result: "Good Luck!",
    note: "",
    goodluck: true,
  },
  {
    label: "Free\n1 Drink",
    emoji: "🍵",
    fill: "#8BAE7B",   // light matcha
    text: "#FFFFFF",
    result: "Free 1 Drink",
    note: "Choose either a Houjicharamisu or Wakoucharamisu. Show this screen to the cashier to claim your free drink!",
    goodluck: false,
  },
  {
    label: "Good\nLuck",
    emoji: "🍀",
    fill: "#D4B896",   // warm sand
    text: "#2B2B2B",
    result: "Good Luck!",
    note: "",
    goodluck: true,
  },
  {
    label: "Good\nLuck",
    emoji: "🍀",
    fill: "#3D5C36",   // deep matcha
    text: "#FFFFFF",
    result: "Good Luck!",
    note: "",
    goodluck: true,
  },
];

const N = SEGMENTS.length;
const arc = (2 * Math.PI) / N;

// ── Canvas drawing ────────────────────────────────────────────────────────────
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const SIZE = canvas.width;
const cx = SIZE / 2, cy = SIZE / 2, R = SIZE / 2 - 8;

function drawWheel(rotation) {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, R + 6, 0, 2 * Math.PI);
  ctx.fillStyle = '#C9963A';
  ctx.fill();

  for (let i = 0; i < N; i++) {
    const start = rotation + i * arc;
    const end   = start + arc;
    const seg   = SEGMENTS[i];

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.fill;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = seg.text;

    const lines = seg.label.split('\n');
    const lineH = lines.length > 2 ? 22 : 26;
    const totalH = lines.length * lineH;
    const baseX = R * 0.85;

    lines.forEach((line, li) => {
      const isFirst = li === 0;
      ctx.font = isFirst
        ? `700 ${lines.length > 2 ? 18 : 20}px 'DM Sans', sans-serif`
        : `500 ${lines.length > 2 ? 15 : 17}px 'DM Sans', sans-serif`;
      const y = (li - (lines.length - 1) / 2) * lineH;
      ctx.fillText(line, baseX, y + 5);
    });

    // Emoji near center
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillText(seg.emoji, R * 0.28, 8);

    ctx.restore();
  }

  // Inner shadow ring
  const grad = ctx.createRadialGradient(cx, cy, R * 0.55, cx, cy, R);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.08)');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ── Spin logic ────────────────────────────────────────────────────────────────
let currentRotation = -Math.PI / 2;  // start so segment 0 is up
let spinning = false;

drawWheel(currentRotation);

function easeOut(t) {
  return 1 - Math.pow(1 - t, 4);
}

function spinWheel() {
  if (spinning) return;
  spinning = true;

  const btn = document.getElementById('spinBtn');
  btn.disabled = true;

  // Pick a random segment
  const winner = Math.floor(Math.random() * N);

  // How many full rotations (5–8) + land on winner
  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const targetAngle = -(winner * arc + arc / 2) - Math.PI / 2;

  // Normalize target so we always spin forward
  let fullTarget = extraSpins + ((targetAngle - currentRotation) % (2 * Math.PI));
  if (fullTarget < extraSpins - 0.1) fullTarget += 2 * Math.PI;

  const startRotation = currentRotation;
  const duration = 4500 + Math.random() * 1000; // ms
  const startTime = performance.now();

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeOut(t);

    currentRotation = startRotation + fullTarget * eased;
    drawWheel(currentRotation);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      showResult(winner);
    }
  }

  requestAnimationFrame(frame);
}

function showResult(idx) {
  const seg = SEGMENTS[idx];
  document.getElementById('resEmoji').textContent = seg.emoji;
  document.getElementById('resTitle').textContent = seg.result;

  const noteEl = document.getElementById('resNote');
  const glNote = document.getElementById('glNote');

  if (seg.goodluck) {
    noteEl.textContent = "Don't be sad — as a thank-you, we're giving you a 20% off voucher for your next visit! 💚";
    glNote.textContent = "Show this screen to the cashier to claim your 20% off voucher.";
  } else {
    noteEl.textContent = seg.note;
    glNote.textContent = '';
  }

  document.getElementById('overlay').classList.add('show');
}

document.getElementById('spinBtn').addEventListener('click', spinWheel);

document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  const btn = document.getElementById('spinBtn');
  btn.disabled = false;
  // Reset wheel for next customer
  currentRotation = -Math.PI / 2;
  drawWheel(currentRotation);
});
</script>
</body>
</html>
